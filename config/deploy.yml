service: asthma_buddy
image: joeasante/asthma-buddy

servers:
  web:
    hosts:
      - 91.99.132.217

proxy:
  app_port: 80            # Thruster inside the container listens on port 80
  forward_headers: true   # preserve X-Forwarded-For/Proto from CloudPanel
  healthcheck:
    path: /up
    interval: 3
  run:
    http_port: 3000       # kamal-proxy binds to 127.0.0.1:3000 (CloudPanel proxies here)
    bind_ips:
      - 127.0.0.1         # loopback only — not exposed publicly

registry:
  server: ghcr.io
  username: joeasante
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true
    APP_HOST: "asthmabuddy.app"

builder:
  arch: amd64
  driver: docker
  args:
    APP_HOST: asthmabuddy.app

# Use a persistent storage volume for SQLite databases and Active Storage files.
volumes:
  - "asthma_buddy_storage:/rails/storage"

asset_path: /rails/public/assets

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole --include-password"
