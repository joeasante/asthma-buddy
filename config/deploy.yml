service: asthma_buddy
image: joeasante/asthma-buddy

servers:
  web:
    hosts:
      - 91.99.132.217
    proxy: false   # CloudPanel's Nginx is the reverse proxy on 80/443
    options:
      publish:
        - "127.0.0.1:3000:80"   # map container port 80 to loopback:3000 only
                                 # CloudPanel's Nginx reverse-proxies to this

registry:
  server: ghcr.io
  username: joeasante
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true
    APP_HOST: "asthmabuddy.app"

builder:
  arch: amd64
  driver: docker
  args:
    APP_HOST: asthmabuddy.app

# Use a persistent storage volume for SQLite databases and Active Storage files.
volumes:
  - "asthma_buddy_storage:/rails/storage"

asset_path: /rails/public/assets

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole --include-password"
